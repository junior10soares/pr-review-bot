name: Dogfood
on:
  pull_request:
permissions:
  pull-requests: write
jobs:
  review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
